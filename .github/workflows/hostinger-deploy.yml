name: Deploy to Hostinger (FTP)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST || secrets.HOSTINGER_FTP_HOST || secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER || secrets.HOSTINGER_FTP_USER || secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASS || secrets.HOSTINGER_FTP_PASS || secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT || secrets.HOSTINGER_FTP_PORT }}
          FTP_DIR: ${{ secrets.FTP_DIR || secrets.HOSTINGER_FTP_DIR }}
          LOCAL_DIR: dist
          CLEAN: ${{ secrets.FTP_CLEAN || secrets.HOSTINGER_FTP_CLEAN }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing FTP secrets. Configure one of these sets in GitHub Secrets:"
            echo "1) FTP_HOST, FTP_USER, FTP_PASS (optional FTP_PORT, FTP_DIR, FTP_CLEAN)"
            echo "2) HOSTINGER_FTP_HOST, HOSTINGER_FTP_USER, HOSTINGER_FTP_PASS (optional HOSTINGER_FTP_PORT, HOSTINGER_FTP_DIR, HOSTINGER_FTP_CLEAN)"
            echo "3) FTP_SERVER, FTP_USERNAME, FTP_PASSWORD"
            exit 1
          fi
          node scripts/deploy-ftp.mjs
