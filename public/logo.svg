<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo circular con cruz médica -->
  <g transform="translate(10, 10)">
    <!-- Círculo exterior -->
    <circle cx="40" cy="40" r="35" stroke="#8B4513" stroke-width="4" fill="none"/>
    
    <!-- Hojas/pétalos decorativos -->
    <path d="M20 40 Q15 30 25 25 Q35 20 40 30 Q45 20 55 25 Q65 30 60 40 Q65 50 55 55 Q45 60 40 50 Q35 60 25 55 Q15 50 20 40 Z" fill="#D2691E" opacity="0.6"/>
    
    <!-- Cruz médica central -->
    <rect x="36" y="28" width="8" height="24" fill="#8B4513"/>
    <rect x="28" y="36" width="24" height="8" fill="#8B4513"/>
  </g>
  
  <!-- Texto RENASCI -->
  <g transform="translate(100, 20)">
    <text x="0" y="35" font-family="serif" font-size="48" font-weight="400" fill="#8B4513" letter-spacing="2px">RENASCI</text>
  </g>
  
  <!-- Texto medical spa -->
  <g transform="translate(100, 65)">
    <text x="0" y="25" font-family="sans-serif" font-size="24" font-weight="300" fill="#A0522D" letter-spacing="4px">medical spa</text>
  </g>
</svg>